name: expertisemarket
description: "ExpertiseMarket - Professional Tools & Services Marketplace"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  gap: ^3.0.1
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.3.0
  equatable: ^2.0.7
  firebase_core: ^4.0.0
  lottie: ^3.3.2
  shared_preferences: ^2.5.5
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/